
<div style="width: 100%; display: flex; justify-content: center; align-items: flex-start; padding: 60px 20px; background: #F5F5F5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <!-- iPhone mockup frame -->
  <div style="width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); position: relative;">
    <!-- Phone notch -->
    <div style="position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 28px; background: #000; border-radius: 0 0 30px 30px; z-index: 10;"></div>
    
    <!-- Screen content -->
    <div style="width: 100%; height: 100%; background: white; border-radius: 45px; overflow: hidden; display: flex; flex-direction: column;">
      <!-- Status bar -->
      <div style="height: 44px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; padding-top: 12px; font-size: 12px; color: #2A2A2A;">
        <span>9:41</span>
        <div style="width: 24px; height: 12px; border: 1.5px solid #2A2A2A; border-radius: 3px;"><div style="position: absolute; right: 2px; top: 2px; width: 8px; height: 8px; background: #2A2A2A; border-radius: 1px;"></div></div>
      </div>
      
      <!-- Header bar -->
      <div style="padding: 16px 20px; border-bottom: 1px solid #E0E0E0; display: flex; align-items: center; gap: 12px;">
        <button style="font-size: 18px; background: none; border: none; cursor: pointer;">←</button>
        <h1 style="font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; color: #2A2A2A; margin: 0;">Order Form</h1>
      </div>
      
      <!-- Form content -->
      <div style="flex: 1; overflow-y: auto; padding: 0;">
        <!-- Product selected -->
        <div style="padding: 20px; border-bottom: 1px solid #E0E0E0;">
          <p style="font-family: 'Inter', sans-serif; font-size: 12px; color: #8A8A8A; margin: 0 0 8px 0; text-transform: uppercase; letter-spacing: 0.5px;">Selected Product</p>
          <h2 style="font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; color: #2A2A2A; margin: 0;">Signature Lacquer Collection</h2>
          <p style="font-family: 'Inter', sans-serif; font-size: 13px; color: #8A8A8A; margin: 0; margin-top: 4px;">45 EGP per unit</p>
        </div>
        
        <!-- Quantity selector -->
        <div style="padding: 20px; border-bottom: 1px solid #E0E0E0;">
          <label style="font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: #2A2A2A; display: block; margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase;">Quantity (Units)</label>
          <div style="display: flex; align-items: center; gap: 12px;">
            <button style="width: 44px; height: 44px; border: 1px solid #D4AF37; background: white; color: #D4AF37; font-size: 18px; border-radius: 6px; cursor: pointer; font-weight: 600;">−</button>
            <input type="number" value="24" style="flex: 1; padding: 12px; border: 1px solid #E0E0E0; border-radius: 6px; text-align: center; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; color: #2A2A2A; box-sizing: border-box;" />
            <button style="width: 44px; height: 44px; border: 1px solid #D4AF37; background: #D4AF37; color: white; font-size: 18px; border-radius: 6px; cursor: pointer; font-weight: 600;">+</button>
          </div>
          <p style="font-family: 'Inter', sans-serif; font-size: 11px; color: #8A8A8A; margin: 8px 0 0 0;">Min. 10 units per order</p>
        </div>
        
        <!-- Order summary -->
        <div style="padding: 20px; background: #FAFAFA; border-bottom: 1px solid #E0E0E0;">
          <p style="font-family: 'Inter', sans-serif; font-size: 12px; color: #8A8A8A; margin: 0 0 8px 0; text-transform: uppercase; letter-spacing: 0.5px;">Order Summary</p>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <span style="font-family: 'Inter', sans-serif; font-size: 13px; color: #5A5A5A;">Subtotal (24 units)</span>
            <span style="font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: #2A2A2A;">1,080 EGP</span>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #E0E0E0;">
            <span style="font-family: 'Inter', sans-serif; font-size: 13px; color: #5A5A5A;">Wholesale discount</span>
            <span style="font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: #D4AF37;">−162 EGP (15%)</span>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 500; color: #2A2A2A;">Total</span>
            <span style="font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; color: #D4AF37;">918 EGP</span>
          </div>
        </div>
        
        <!-- Terms note -->
        <div style="padding: 16px 20px; background: #F9F9F9;">
          <p style="font-family: 'Inter', sans-serif; font-size: 11px; color: #6A6A6A; margin: 0; line-height: 1.5;">Net-30 payment terms. Free shipping on orders over 2,000 EGP.</p>
        </div>
      </div>
      
      <!-- CTA button (sticky) -->
      <div style="padding: 16px 20px; border-top: 1px solid #E0E0E0;">
        <button style="width: 100%; padding: 14px 16px; background: #D4AF37; color: white; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer;">
          Place Order
        </button>
      </div>
      
      <!-- Bottom safe area -->
      <div style="height: 34px;"></div>
    </div>
  </div>
</div>
