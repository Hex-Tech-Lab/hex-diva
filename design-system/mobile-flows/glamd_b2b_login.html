
<div style="width: 100%; display: flex; justify-content: center; align-items: flex-start; padding: 60px 20px; background: #F5F5F5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <!-- iPhone mockup frame -->
  <div style="width: 375px; height: 812px; background: #000; border-radius: 50px; padding: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); position: relative;">
    <!-- Phone notch -->
    <div style="position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 28px; background: #000; border-radius: 0 0 30px 30px; z-index: 10;"></div>
    
    <!-- Screen content -->
    <div style="width: 100%; height: 100%; background: white; border-radius: 45px; overflow: hidden; display: flex; flex-direction: column;">
      <!-- Status bar area -->
      <div style="height: 44px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; padding-top: 12px; font-size: 12px; color: #2A2A2A;">
        <span>9:41</span>
        <div style="width: 24px; height: 12px; border: 1.5px solid #2A2A2A; border-radius: 3px; position: relative;">
          <div style="position: absolute; right: 2px; top: 2px; width: 8px; height: 8px; background: #2A2A2A; border-radius: 1px;"></div>
        </div>
      </div>
      
      <!-- Safe area content -->
      <div style="flex: 1; overflow-y: auto; padding: 0 20px; display: flex; flex-direction: column; justify-content: center;">
        <!-- Header -->
        <div style="margin-bottom: 48px; text-align: center;">
          <div style="font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 500; color: #2A2A2A; margin-bottom: 8px; letter-spacing: -0.5px;">GlamD</div>
          <div style="font-family: 'Inter', sans-serif; font-size: 14px; color: #8A8A8A;">Wholesale Portal</div>
        </div>
        
        <!-- Form -->
        <div style="margin-bottom: 32px;">
          <!-- Email input -->
          <div style="margin-bottom: 16px;">
            <label style="font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: #2A2A2A; display: block; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;">Email</label>
            <input type="email" placeholder="business@company.com" style="width: 100%; padding: 12px 16px; border: 1px solid #E0E0E0; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 16px; background: #FAFAFA; color: #2A2A2A; box-sizing: border-box;" />
          </div>
          
          <!-- Password input -->
          <div style="margin-bottom: 24px;">
            <label style="font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: #2A2A2A; display: block; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;">Password</label>
            <input type="password" placeholder="••••••••" style="width: 100%; padding: 12px 16px; border: 1px solid #E0E0E0; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 16px; background: #FAFAFA; color: #2A2A2A; box-sizing: border-box;" />
          </div>
          
          <!-- Forgot password link -->
          <div style="text-align: right; margin-bottom: 32px;">
            <a href="#" style="font-family: 'Inter', sans-serif; font-size: 12px; color: #D4AF37; text-decoration: none;">Forgot password?</a>
          </div>
          
          <!-- CTA Button -->
          <button style="width: 100%; padding: 14px 16px; background: #D4AF37; color: white; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; transition: background 200ms ease-out;">
            Login as Wholesaler
          </button>
        </div>
        
        <!-- Divider -->
        <div style="display: flex; align-items: center; margin: 32px 0; gap: 12px;">
          <div style="flex: 1; height: 1px; background: #E0E0E0;"></div>
          <span style="font-family: 'Inter', sans-serif; font-size: 12px; color: #8A8A8A;">OR</span>
          <div style="flex: 1; height: 1px; background: #E0E0E0;"></div>
        </div>
        
        <!-- Secondary CTA -->
        <button style="width: 100%; padding: 14px 16px; background: transparent; color: #D4AF37; border: 1.5px solid #D4AF37; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer;">
          Create Account
        </button>
      </div>
      
      <!-- Bottom safe area (home indicator space) -->
      <div style="height: 34px;"></div>
    </div>
  </div>
</div>
